services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: localgo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-localgo}
      POSTGRES_DB: localgo
    ports:
      - '5432:5432'
    volumes:
      - localgo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U localgo -d localgo']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://localgo:${POSTGRES_PASSWORD:-localgo}@postgres:5432/localgo
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
      UPLOAD_DIR: uploads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3001}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-true}
      MAX_IMAGE_SIZE_MB: ${MAX_IMAGE_SIZE_MB:-5}
      BODY_LIMIT: ${BODY_LIMIT:-1mb}
      RATE_LIMIT_TTL: ${RATE_LIMIT_TTL:-60000}
      RATE_LIMIT_LIMIT: ${RATE_LIMIT_LIMIT:-100}
      MEDIA_STORAGE_PROVIDER: local
      ZALO_AUTH_MODE: ${ZALO_AUTH_MODE:-mock}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@localgo.local}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
    ports:
      - '3001:3001'
    volumes:
      - localgo_uploads:/app/uploads

volumes:
  localgo_postgres_data:
  localgo_uploads:
